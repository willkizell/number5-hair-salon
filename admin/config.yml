# ─────────────────────────────────────────────────────────
# Decap CMS configuration — Number 5 Hair Salon
# Docs: https://decapcms.org/docs/configuration-options/
#
# SETUP CHECKLIST (one-time, in Netlify dashboard):
#  1. Site Settings → Identity → Enable Netlify Identity
#  2. Site Settings → Identity → Services → Enable Git Gateway
#  3. Invite the salon owner via Identity → Invite Users
# ─────────────────────────────────────────────────────────

backend:
  name: git-gateway
  branch: main

# Where uploaded photos are stored in the repo
media_folder: "photos/uploads"
# Public URL prefix used when saving image paths in JSON
public_folder: "/photos/uploads"

# ─────────────────────────────────────────────────────────
# COLLECTIONS
# ─────────────────────────────────────────────────────────
collections:

  # ── 1. ANNOUNCEMENT BAR ──────────────────────────────
  - name: settings
    label: "Announcement Bar"
    format: json
    files:
      - name: announcement
        label: "Announcement Text"
        file: "data/settings/announcement.json"
        description: >
          The scrolling strip at the very top of the page.
          Update both English and Chinese versions.
        fields:
          - label: "Text — English"
            name: text_en
            widget: string
            hint: >
              e.g. Walk-ins welcome · UBC AMS Nest · Open daily 10:30am – 6:30pm
          - label: "Text — Chinese (中文)"
            name: text_zh
            widget: string
            hint: >
              e.g. 欢迎直接到店 · UBC AMS大楼 · 每日营业 10:30am – 6:30pm

  # ── 2. HERO IMAGE ────────────────────────────────────
  - name: hero
    label: "Hero Image"
    format: json
    files:
      - name: hero
        label: "Hero Photo"
        file: "data/hero.json"
        description: >
          The large photo on the right side of the homepage banner.
          Recommended: landscape orientation, at least 1400 px wide.
        fields:
          - label: "Hero Image"
            name: image
            widget: image
            hint: "JPG or PNG, landscape, min 1400 px wide for best quality"

  # ── 3. GALLERY ───────────────────────────────────────
  - name: gallery
    label: "Gallery Photos"
    format: json
    files:
      - name: gallery
        label: "Gallery Carousel"
        file: "data/gallery.json"
        description: >
          Photos displayed in the carousel on the homepage.
          Drag rows to reorder. Click the + button to add more.
        fields:
          - label: "Photos"
            name: photos
            widget: list
            allow_add: true
            minimize_collapsed: true
            label_singular: "Photo"
            fields:
              - label: "Photo"
                name: image
                widget: image
              - label: "Alt Text (optional)"
                name: alt
                widget: string
                required: false
                hint: >
                  A short description of the photo for screen readers.
                  e.g. "Salon interior showing styling chairs"

  # ── 4. SERVICES & PRICES ─────────────────────────────
  - name: services
    label: "Services & Prices"
    format: json
    files:
      - name: services
        label: "Services & Prices"
        file: "data/services.json"
        description: >
          Every service, price, and description on the homepage — in English
          and 中文. Services are organised into groups (e.g. Men's Services,
          Lady Service). Drag rows to reorder; use the + button to add.
          Single-price groups: fill "Price". Two-column groups (Short / Long):
          turn on "Two price columns" and fill Price 1 and Price 2.
        fields:
          - label: "Service Groups"
            name: groups
            widget: list
            label_singular: "Group"
            collapsed: true
            summary: "{{fields.label_en}}"
            fields:
              - { label: "Group Name — English", name: label_en, widget: string }
              - { label: "Group Name — 中文", name: label_zh, widget: string }
              - label: "Two price columns (Short / Long)?"
                name: dual_price
                widget: boolean
                default: false
                hint: "ON = two price columns (e.g. Lady Service: Short & Long). OFF = one price per service (e.g. Men's Services)."
              - { label: "Column 1 label — English", name: col1_en, widget: string, required: false, default: "Short", hint: "Only used when two price columns is ON" }
              - { label: "Column 1 label — 中文", name: col1_zh, widget: string, required: false, default: "短发" }
              - { label: "Column 2 label — English", name: col2_en, widget: string, required: false, default: "Long", hint: "Only used when two price columns is ON" }
              - { label: "Column 2 label — 中文", name: col2_zh, widget: string, required: false, default: "长发" }
              - label: "Services in this group"
                name: items
                widget: list
                label_singular: "Service"
                collapsed: true
                summary: "{{fields.name_en}}  ·  {{fields.price}}{{fields.price2}}"
                fields:
                  - { label: "Service Name — English", name: name_en, widget: string }
                  - { label: "Service Name — 中文", name: name_zh, widget: string }
                  - { label: "Price (single-price groups)", name: price, widget: string, required: false, hint: "e.g. $22 up — use for single-price groups like Men's Services" }
                  - { label: "Price 1 / left column (two-column groups)", name: price1, widget: string, required: false, hint: "e.g. Short price. Enter — if not offered" }
                  - { label: "Price 2 / right column (two-column groups)", name: price2, widget: string, required: false, hint: "e.g. Long price" }
                  - { label: "Description — English", name: desc_en, widget: string, hint: "One sentence shown when the service is expanded" }
                  - { label: "Description — 中文", name: desc_zh, widget: string }
